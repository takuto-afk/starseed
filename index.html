<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スターシード診断</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: #fff;
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

#progressText {
  text-align: center;
  font-size: 14px;
  margin-bottom: 8px;
}

#bar {
  width: 100%;
  height: 6px;
  background: #333;
  border-radius: 10px;
  margin-bottom: 20px;
}

#progressBar {
  height: 6px;
  width: 0%;
  background: linear-gradient(90deg, #00c9ff, #92fe9d);
  border-radius: 10px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.4s ease;
}

.question {
  font-size: 18px;
  margin-bottom: 20px;
}

button {
  display: block;
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6a5acd, #00c9ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.96);
}

#result {
  text-align: center;
  margin-top: 30px;
  font-size: 20px;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<h2>🌌 スターシード診断</h2>

<div id="progressText"></div>
<div id="bar"><div id="progressBar"></div></div>

<div id="quiz" class="card"></div>

<div id="result"></div>

<script>
const questions = [
  {
    text: "直感で選んでください：あなたに近いのは？",
    answers: [
      { text: "共感しやすい", type: "pleiades" },
      { text: "分析する", type: "sirius" },
      { text: "空気を感じる", type: "arcturus" },
      { text: "変化を求める", type: "orion" }
    ]
  },
  {
    text: "疲れる原因は？",
    answers: [
      { text: "人の感情", type: "pleiades" },
      { text: "非合理", type: "sirius" },
      { text: "騒音", type: "arcturus" },
      { text: "停滞", type: "orion" }
    ]
  },
  {
    text: "役割として近いのは？",
    answers: [
      { text: "癒す", role: "healer" },
      { text: "導く", role: "guide" },
      { text: "表現する", role: "creator" },
      { text: "変える", role: "changer" }
    ]
  }
];

let current = 0;

let score = {
  pleiades: 0,
  sirius: 0,
  arcturus: 0,
  orion: 0
};

let role = "";

function showQuestion() {
  const quiz = document.getElementById("quiz");
  const progressText = document.getElementById("progressText");
  const progressBar = document.getElementById("progressBar");

  window.scrollTo(0, 0);

  quiz.innerHTML = "";

  if (current >= questions.length) {
    showResult();
    return;
  }

  const q = questions[current];

  progressText.innerText = `残り ${questions.length - current} 問`;
  progressBar.style.width = (current / questions.length * 100) + "%";

  const title = document.createElement("div");
  title.className = "question";
  title.innerText = q.text;
  quiz.appendChild(title);

  q.answers.forEach(a => {
    const btn = document.createElement("button");
    btn.innerText = a.text;

    btn.onclick = () => {
      if (a.type) score[a.type]++;
      if (a.role) role = a.role;
      current++;
      showQuestion();
    };

    quiz.appendChild(btn);
  });
}

function showResult() {
  let max = 0;
  let resultType = "";

  for (let key in score) {
    if (score[key] > max) {
      max = score[key];
      resultType = key;
    }
  }

  const resultMap = {
    pleiades: "プレアデス",
    sirius: "シリウス",
    arcturus: "アルクトゥルス",
    orion: "オリオン"
  };

  const roleMap = {
    healer: "ヒーラー",
    guide: "ガイド",
    creator: "クリエイター",
    changer: "トランスフォーマー"
  };

  document.getElementById("quiz").innerHTML = "";
  document.getElementById("progressText").innerHTML = "";
  document.getElementById("bar").style.display = "none";

  document.getElementById("result").innerHTML =
    `🌌 あなたのタイプ<br><br>
    <strong>${resultMap[resultType]} × ${roleMap[role]}</strong><br><br>
    あなたは独自の感性と役割を持つ存在です。`;
}

showQuestion();
</script>

</body>
</html>
